<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>另一双眼 - 小红花公益游戏</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
/* ============ CSS 变量与全局样式 ============ */
:root {
  --primary-green: #7CB89E;
  --primary-green-dark: #5A9E7A;
  --primary-green-light: #8CC4A8;
  --primary-green-pale: #E8F0EC;
  --warm-orange: #7CB89E;
  --warm-orange-dark: #5A9E7A;
  --warm-peach: #E8F0EC;
  --warm-cream: #F8FAF9;
  --warm-white: #FFFFFF;
  --warm-brown: #5D4037;
  --warm-brown-light: #8D6E63;
  --golden: #8CC4A8;
  --soft-green: #66BB6A;
  --soft-red: #EF5350;
  --soft-blue: #64B5F6;
  --flower-red: #E84A5F;
  --flower-pink: #F4978E;
  --card-shadow: 0 4px 20px rgba(92, 107, 102, 0.08);
  --card-shadow-hover: 0 8px 32px rgba(92, 107, 102, 0.14);
  --radius-sm: 12px;
  --radius-md: 20px;
  --radius-lg: 28px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: url("背景图.png") no-repeat center center fixed;
  background-size: cover;
  min-height: 100vh;
  color: var(--warm-brown);
  line-height: 1.6;
  overflow-x: hidden;
}

/* 背景装饰 - 覆盖在全屏背景图上方的柔和遮罩，确保内容可读性 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: rgba(248, 250, 249, 0.15);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  top: -100px; right: -100px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(124,184,158,0.10) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

/* ============ 主容器 ============ */
.app-container {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px 16px 40px;
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: safe center;
}

/* ============ 通用卡片样式 ============ */
.card {
  background: var(--warm-white);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  box-shadow: var(--card-shadow);
  margin-bottom: 16px;
  transition: var(--transition);
  border: 1px solid rgba(232, 149, 106, 0.1);
}

.screen {
  display: none;
  animation: fadeIn 0.5s ease;
}
.screen.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============ 插画容器 ============ */
.illustration-wrap {
  width: 100%;
  border-radius: var(--radius-md);
  overflow: hidden;
  margin-bottom: 16px;
  position: relative;
}
.illustration-wrap svg {
  width: 100%;
  height: auto;
  display: block;
}

.scene-illustration {
  border-radius: var(--radius-md);
  overflow: hidden;
  margin-bottom: 14px;
  box-shadow: 0 2px 12px rgba(93,64,55,0.1);
}
.scene-illustration svg {
  width: 100%;
  height: auto;
  display: block;
}

.character-portrait {
  display: flex;
  align-items: center;
  gap: 14px;
  background: linear-gradient(135deg, rgba(232,240,236,0.3), rgba(248,250,249,0.5));
  border-radius: var(--radius-md);
  padding: 12px 16px;
  margin-bottom: 14px;
  border: 1px solid rgba(124,184,158,0.12);
}
.character-portrait .portrait-svg {
  width: 72px;
  height: 72px;
  flex-shrink: 0;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(93,64,55,0.12);
}
.character-portrait .portrait-svg svg {
  width: 100%;
  height: 100%;
}
.character-portrait .portrait-info {
  flex: 1;
}
.character-portrait .portrait-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--warm-brown);
}
.character-portrait .portrait-desc {
  font-size: 12px;
  color: var(--warm-brown-light);
  margin-top: 2px;
}

/* ============ 首页样式 ============ */
.home-hero {
  text-align: center;
  padding: 20px 0 10px;
}
.home-hero svg { max-width: 320px; margin: 0 auto; }

.home-title {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 38px;
  font-weight: 400;
  color: var(--warm-brown);
  margin: 12px 0 4px;
  letter-spacing: 2px;
}
.home-subtitle {
  font-size: 14px;
  color: var(--warm-brown-light);
  margin-bottom: 8px;
}

.flower-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, #E84A5F, #F4978E);
  color: white;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 16px;
  box-shadow: 0 3px 10px rgba(232,74,95,0.25);
}

/* ============ 类型选择卡片 ============ */
.type-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.type-card {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--warm-white);
  border-radius: var(--radius-md);
  padding: 16px;
  cursor: pointer;
  transition: var(--transition);
  border: 2px solid transparent;
  box-shadow: var(--card-shadow);
}
.type-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--card-shadow-hover);
}
.type-card.selected {
  border-color: var(--warm-orange);
  background: linear-gradient(135deg, rgba(124,184,158,0.06), rgba(232,240,236,0.1));
}
.type-card .type-icon {
  width: 60px; height: 60px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
  overflow: hidden;
  padding: 2px;
}
.type-card .type-icon img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 14px;
}
.type-card .type-icon svg { width: 36px; height: 36px; }
.type-card .type-info { flex: 1; }
.type-card .type-name { font-size: 16px; font-weight: 700; color: var(--warm-brown); }
.type-card .type-desc { font-size: 13px; color: var(--warm-brown-light); margin-top: 2px; }
.type-card .type-check {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid var(--warm-peach);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: var(--transition);
}
.type-card.selected .type-check {
  background: var(--warm-orange);
  border-color: var(--warm-orange);
}

/* ============ 模式选择卡片 ============ */
.section-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--warm-brown-light);
  margin-bottom: 10px;
  text-align: center;
}
.mode-grid {
  display: flex;
  gap: 12px;
}
.mode-card {
  flex: 1;
  background: var(--warm-white);
  border-radius: 16px;
  padding: 14px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  border: 2px solid transparent;
  box-shadow: var(--card-shadow);
}
.mode-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--card-shadow-hover);
}
.mode-card.selected {
  border-color: var(--warm-orange);
  background: linear-gradient(135deg, rgba(124,184,158,0.06), rgba(232,240,236,0.15));
}
.mode-card .mode-icon {
  font-size: 32px;
  margin-bottom: 6px;
}
.mode-card .mode-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--warm-brown);
  margin-bottom: 2px;
}
.mode-card .mode-desc {
  font-size: 11px;
  color: var(--warm-brown-light);
  line-height: 1.5;
}
.mode-card .mode-check {
  display: inline-block;
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid var(--warm-peach);
  margin-top: 6px;
  transition: var(--transition);
  font-size: 12px;
  line-height: 18px;
  color: white;
}
.mode-card.selected .mode-check {
  background: var(--warm-orange);
  border-color: var(--warm-orange);
}

/* ============ 按钮样式 ============ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 28px;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.btn-primary {
  background: linear-gradient(135deg, var(--warm-orange), var(--warm-orange-dark));
  color: white;
  box-shadow: 0 4px 14px rgba(124,184,158,0.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,184,158,0.4); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary {
  background: var(--warm-white);
  color: var(--warm-brown);
  border: 1px solid var(--warm-peach);
}
.btn-secondary:hover { background: var(--warm-cream); }
.btn-text {
  background: transparent;
  color: var(--warm-brown-light);
  font-size: 14px;
}
.btn-text:hover { color: var(--warm-orange); }

/* ============ 进度条 ============ */
.progress-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}
.progress-dots {
  display: flex;
  gap: 6px;
  flex: 1;
}
.progress-dot {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: var(--warm-peach);
  opacity: 0.5;
  transition: var(--transition);
}
.progress-dot.active {
  background: var(--warm-orange);
  opacity: 1;
}
.progress-dot.done {
  background: var(--soft-green);
  opacity: 1;
}
.progress-text {
  font-size: 13px;
  color: var(--warm-brown-light);
  white-space: nowrap;
}

/* ============ 场景标题 ============ */
.scene-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.scene-stage-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 600;
}
.scene-stage-tag.child { background: rgba(124,184,158,0.15); color: #3D7A5E; }
.scene-stage-tag.teen { background: rgba(92,107,102,0.12); color: #4A6A5E; }
.scene-stage-tag.adult { background: rgba(124,184,158,0.15); color: #3D7A5E; }

.scene-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--warm-brown);
  margin-bottom: 10px;
}
.scene-text {
  font-size: 15px;
  color: var(--warm-brown);
  line-height: 1.75;
  margin-bottom: 16px;
}

/* ============ 选项样式 ============ */
.choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.choice-btn {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  background: var(--warm-cream);
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: var(--transition);
  text-align: left;
  font-family: inherit;
  font-size: 14px;
  color: var(--warm-brown);
  line-height: 1.5;
}
.choice-btn:hover {
  border-color: var(--warm-orange);
  background: var(--warm-white);
  transform: translateX(4px);
}
.choice-btn .choice-letter {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--warm-peach);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--warm-brown);
  flex-shrink: 0;
  transition: var(--transition);
}
.choice-btn:hover .choice-letter {
  background: var(--warm-orange);
  color: white;
}

/* ============ 反馈样式 ============ */
.feedback-icon {
  width: 56px; height: 56px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  margin: 0 auto 12px;
}
.feedback-icon.positive { background: rgba(102,187,106,0.15); }
.feedback-icon.negative { background: rgba(239,83,80,0.15); }
.feedback-icon.neutral { background: rgba(124,184,158,0.15); }

.feedback-title {
  text-align: center;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
}
.feedback-text {
  text-align: center;
  font-size: 14px;
  color: var(--warm-brown-light);
  line-height: 1.7;
  margin-bottom: 16px;
}
.score-change {
  text-align: center;
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 16px;
}

/* ============ 改造样式 ============ */
.renovation-compare {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.renovation-side {
  flex: 1;
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.renovation-side .reno-label {
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  text-align: center;
}
.renovation-side.before .reno-label { background: rgba(239,83,80,0.1); color: var(--soft-red); }
.renovation-side.after .reno-label { background: rgba(102,187,106,0.1); color: var(--soft-green); }
.renovation-side .reno-illust svg { width: 100%; height: auto; display: block; }
.renovation-side .reno-text {
  font-size: 12px;
  padding: 8px 10px;
  color: var(--warm-brown);
  line-height: 1.5;
  background: var(--warm-cream);
}

/* ============ 结局样式 ============ */
.ending-hero {
  text-align: center;
  padding: 10px 0;
}
.ending-hero svg { max-width: 280px; margin: 0 auto; }
.ending-title {
  text-align: center;
  font-size: 24px;
  font-weight: 800;
  margin: 12px 0 4px;
}
.ending-rank {
  text-align: center;
  font-size: 14px;
  color: var(--warm-brown-light);
  margin-bottom: 12px;
}
.ending-score-display {
  text-align: center;
  margin-bottom: 16px;
}
.ending-score-display .score-num {
  font-size: 40px;
  font-weight: 900;
  color: var(--warm-orange);
}
.ending-score-display .score-label {
  font-size: 13px;
  color: var(--warm-brown-light);
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.stat-item {
  text-align: center;
  background: var(--warm-cream);
  border-radius: var(--radius-sm);
  padding: 12px 8px;
}
.stat-item .stat-val {
  font-size: 20px;
  font-weight: 800;
  color: var(--warm-brown);
}
.stat-item .stat-label {
  font-size: 11px;
  color: var(--warm-brown-light);
  margin-top: 2px;
}

/* ============ 工具栏 ============ */
.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.toolbar-left, .toolbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.tool-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  background: var(--warm-cream);
  color: var(--warm-brown);
}

/* ============ Toast ============ */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--warm-brown);
  color: white;
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 14px;
  z-index: 9999;
  transition: transform 0.3s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ============ 浮动花瓣 ============ */
.petal {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* ============ 响应式 ============ */
@media (max-width: 380px) {
  .home-title { font-size: 30px; }
  .scene-title { font-size: 18px; }
  .renovation-compare { flex-direction: column; }
}

/* ============ 登录/注册页 ============ */
.auth-card { max-width: 380px; margin: 0 auto; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid rgba(124,184,158,0.2); }
.auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 600; background: var(--warm-white); color: var(--warm-brown-light); border: none; font-family: inherit; transition: var(--transition); }
.auth-tab.active { background: linear-gradient(135deg, var(--warm-orange), var(--warm-orange-dark)); color: white; }
.auth-form { display: none; }
.auth-form.active { display: block; }
.auth-field { margin-bottom: 14px; }
.auth-field label { display: block; font-size: 13px; font-weight: 600; color: var(--warm-brown); margin-bottom: 6px; }
.auth-field input { width: 100%; padding: 12px 14px; border: 1.5px solid rgba(124,184,158,0.2); border-radius: var(--radius-sm); font-size: 15px; font-family: inherit; color: var(--warm-brown); background: var(--warm-cream); outline: none; transition: var(--transition); }
.auth-field input:focus { border-color: var(--warm-orange); box-shadow: 0 0 0 3px rgba(124,184,158,0.1); }
.auth-error { color: var(--soft-red); font-size: 13px; text-align: center; margin-bottom: 10px; min-height: 20px; }

/* ============ 地图页 ============ */
.map-header { display: flex; align-items: center; justify-content: space-between; background: var(--warm-white); border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 12px; box-shadow: var(--card-shadow); border: 1px solid rgba(124,184,158,0.1); }
.map-header-left { display: flex; align-items: center; gap: 10px; }
.map-header-right { display: flex; align-items: center; gap: 8px; }
.map-user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--warm-orange), var(--warm-orange-dark)); display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; font-weight: 700; }
.map-user-name { font-size: 14px; font-weight: 700; color: var(--warm-brown); }
.map-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; background: var(--warm-cream); color: var(--warm-brown); }
.map-chip.score { background: rgba(124,184,158,0.12); color: #3D7A5E; }
.map-progress-text { font-size: 11px; color: var(--warm-brown-light); text-align: center; margin-bottom: 8px; }
.map-container { position: relative; width: 100%; aspect-ratio: 4/5; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--card-shadow); border: 2px solid rgba(124,184,158,0.15); background: linear-gradient(180deg, #E8F5E9 0%, #C8E6C9 20%, #A5D6A7 40%, #81C784 55%, #B0BEC5 65%, #90A4AE 80%, #78909C 100%); }
.map-bg-elements { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.map-city-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
.map-landmark { position: absolute; transform: translate(-50%,-50%); z-index: 10; cursor: pointer; transition: all 0.35s cubic-bezier(0.4,0,0.2,1); }
.map-landmark:hover { z-index: 20; }
.map-landmark:hover .landmark-dot { transform: scale(1.25); box-shadow: 0 0 0 8px rgba(124,184,158,0.2); }
.map-landmark:hover .landmark-label { opacity: 1; transform: translate(-50%,2px); }
.landmark-dot { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--warm-orange), var(--warm-orange-dark)); box-shadow: 0 4px 14px rgba(124,184,158,0.35); display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.35s ease; border: 3px solid white; position: relative; }
.landmark-dot.completed { background: linear-gradient(135deg, #BDBDBD, #9E9E9E); box-shadow: 0 2px 6px rgba(0,0,0,0.1); opacity: 0.7; border-color: #E0E0E0; }
.landmark-dot.completed::after { content: '✓'; position: absolute; bottom: -2px; right: -2px; width: 18px; height: 18px; background: var(--soft-green); border-radius: 50%; font-size: 10px; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white; }
.landmark-label { position: absolute; top: 100%; left: 50%; transform: translate(-50%,4px); background: var(--warm-brown); color: white; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; opacity: 0; transition: all 0.3s ease; pointer-events: none; }

/* ============ Modal 遮罩 ============ */
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.5); align-items: flex-start; justify-content: center; padding: 40px 16px 80px; overflow-y: auto; }
.modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
.modal-content { background: var(--warm-white); border-radius: var(--radius-lg); max-width: 520px; width: 100%; box-shadow: 0 16px 48px rgba(0,0,0,0.2); position: relative; animation: modalSlideUp 0.35s cubic-bezier(0.4,0,0.2,1); }
@keyframes modalSlideUp { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal-close { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.06); border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--warm-brown-light); z-index: 10; transition: var(--transition); }
.modal-close:hover { background: rgba(0,0,0,0.12); color: var(--warm-brown); }
.modal-inner { padding: 24px 20px; }
.btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 8px; }
.btn-logout { background: none; border: 1px solid rgba(124,184,158,0.3); color: var(--warm-brown-light); padding: 4px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: inherit; transition: var(--transition); }
.btn-logout:hover { background: rgba(124,184,158,0.08); color: var(--warm-brown); }

/* ============ 模式切换 ============ */
.mode-toggle {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 16px;
  border-radius: 16px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.3);
  cursor: pointer;
  transition: var(--transition);
}
.mode-toggle:hover { background: rgba(255,255,255,0.3); }
.mode-toggle-label { font-size: 14px; font-weight: 600; color: #AED4E8; }
.mode-toggle-hint { font-size: 11px; color: rgba(174,212,232,0.85); }

/* 地标脉冲动画 */
@keyframes landmarkPulse {
  0% { box-shadow: 0 0 0 0 rgba(124,184,158,0.5); }
  70% { box-shadow: 0 0 0 12px rgba(124,184,158,0); }
  100% { box-shadow: 0 0 0 0 rgba(124,184,158,0); }
}
.landmark-dot.pulse {
  animation: landmarkPulse 2s infinite;
}

/* ============ 地标选择列表 ============ */
.landmark-type-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.landmark-type-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  background: var(--warm-cream);
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: var(--transition);
  text-align: left;
}
.landmark-type-item:hover {
  border-color: var(--warm-orange);
  background: var(--warm-white);
  transform: translateX(4px);
}
.landmark-type-item.completed {
  background: #f5f5f5;
  border-color: #e0e0e0;
  cursor: default;
  opacity: 0.7;
}
.landmark-type-item.completed:hover {
  transform: none;
  border-color: #e0e0e0;
}
.landmark-type-item .type-icon-small {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;

}

// ============ 改造前后插画 ============
function getRenoSVG(type, eventIdx, isAfter) {
  const beforeScenes = {
    physical: ['台阶阻挡','公交缝隙','旋转门','高窗台','餐厅台阶','无直梯'],
    visual: ['黑板小字','无声红绿灯','纸质表格','无盲道','小字聊天','小标签'],
    hearing: ['课堂听不清','无声来车','电话铃声','叫号听不见','会议混乱','无字幕'],
  };
  const afterScenes = {
    physical: ['坡道通行','无缝踏板','自动平开门','低位窗口','坡道+宽门','无障碍电梯'],
    visual: ['大字+助视','语音红绿灯','电子表格','盲道引导','文字描述','语音标签'],
    hearing: ['PPT字幕','闪烁警示','文字面试','振动叫号','实时字幕','字幕场次'],
  };
  const label = isAfter ? afterScenes[type][eventIdx] : beforeScenes[type][eventIdx];
  const color = isAfter ? '#66BB6A' : '#EF5350';
  const bgColor = isAfter ? '#E8F5E9' : '#FFEBEE';
  const icon = isAfter ? '✅' : '❌';

  return `<svg viewBox="0 0 180 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="180" height="100" rx="8" fill="${bgColor}" opacity="0.5"/>
    <rect x="10" y="10" width="160" height="80" rx="6" fill="${isAfter ? '#C8E6C9' : '#FFCDD2'}" opacity="0.3"/>
    <text x="90" y="40" font-size="24" text-anchor="middle">${icon}</text>
    <text x="90" y="65" font-size="10" fill="${color}" text-anchor="middle" font-weight="bold">${label}</text>
    <text x="90" y="80" font-size="7" fill="${color}" text-anchor="middle" opacity="0.6">${isAfter ? '改造后' : '改造前'}</text>
  </svg>`;
}

/* ============================================================
   用户系统 (localStorage)
   ============================================================ */
function loadUsers() {
  try { return JSON.parse(localStorage.getItem('anotherEyes_users') || '[]'); }
  catch(e) { return []; }
}
function saveUsers(users) {
  localStorage.setItem('anotherEyes_users', JSON.stringify(users));
}
function getCurrentUser() {
  const username = localStorage.getItem('anotherEyes_current');
  if (!username) return null;
  const users = loadUsers();
  return users.find(u => u.username === username) || null;
}
function setCurrentUser(username) {
  localStorage.setItem('anotherEyes_current', username);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) { el.classList.add('active'); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), duration);
}

  return currentMode === 'immersive' ? '🎭 沉浸模式' : '👁 半沉浸模式';
}
function toggleModeAuth() {
  currentMode = currentMode === 'immersive' ? 'semi' : 'immersive';
  document.getElementById('mode-toggle-label').textContent = getModeLabel();
  showToast(currentMode === 'immersive' ? '已切换为沉浸模式' : '已切换为半沉浸模式');
}
function toggleModeMap() {
  currentMode = currentMode === 'immersive' ? 'semi' : 'immersive';
  document.getElementById('map-mode').textContent = getModeLabel();
  showToast(currentMode === 'immersive' ? '已切换为沉浸模式' : '已切换为半沉浸模式');
  // 保存到用户数据
  const user = getCurrentUser();
  if (user) {
    user.mode = currentMode;
    const users = loadUsers();
    const idx = users.findIndex(u => u.username === user.username);
    if (idx >= 0) users[idx] = user;
    saveUsers(users);
  }
}

// ============ 登录/注册逻辑 ============
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  if (tab === 'login') {
    document.querySelectorAll('.auth-tab')[0].classList.add('active');
    document.getElementById('login-form').classList.add('active');
  } else {
    document.querySelectorAll('.auth-tab')[1].classList.add('active');
    document.getElementById('register-form').classList.add('active');
  }
  document.getElementById('login-error').textContent = '';
  document.getElementById('reg-error').textContent = '';
}

function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value.trim();
  const errEl = document.getElementById('reg-error');
  if (!username) { errEl.textContent = '请输入用户名'; return; }
  if (password.length < 4) { errEl.textContent = '密码至少4位'; return; }
  const users = loadUsers();
  if (users.find(u => u.username === username)) { errEl.textContent = '用户名已存在'; return; }
  const newUser = { username, password, empathyScore: 0, completedEvents: [], correctCount: 0, wrongCount: 0, renoCount: 0, mode: currentMode };
  users.push(newUser);
  saveUsers(users);
  setCurrentUser(username);
  showToast('🎉 注册成功！欢迎来到游戏~');
  enterMap();
}

function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();
  const errEl = document.getElementById('login-error');
  if (!username || !password) { errEl.textContent = '请填写用户名和密码'; return; }
  const users = loadUsers();
  const user = users.find(u => u.username === username && u.password === password);
  if (!user) { errEl.textContent = '用户名或密码错误'; return; }
  // 恢复用户的模式设置
  if (user.mode) currentMode = user.mode;
  setCurrentUser(username);
  showToast('👋 欢迎回来，' + username + '！');
  enterMap();
}

function doLogout() {
  if (!confirm('确定要退出登录吗？')) return;
  localStorage.removeItem('anotherEyes_current');
  showScreen('screen-auth');
}

// ============ 进入地图 ============
function enterMap() {
  document.getElementById('mode-toggle-label').textContent = getModeLabel();
  renderMap();
  showScreen('screen-map');
}

// ============ 地图渲染 ============
function renderMap() {
  const user = getCurrentUser();
  if (!user) { showScreen('screen-auth'); return; }

  const completed = user.completedEvents || [];
  const doneCount = completed.length;
  const allDone = doneCount >= TOTAL_EVENTS;
  const progressPct = Math.round((doneCount / TOTAL_EVENTS) * 100);

  // 更新头部
  document.getElementById('map-avatar').textContent = user.username.charAt(0).toUpperCase();
  document.getElementById('map-username').textContent = user.username;
  document.getElementById('map-progress').textContent = `📍 已探索 ${doneCount}/${TOTAL_EVENTS} 个地点`;
  document.getElementById('map-score').textContent = `❤️ ${user.empathyScore || 0}`;
  document.getElementById('map-mode').textContent = getModeLabel();

  // SVG城市背景 + CSS渐变，地标动态覆盖
  const mapContainer = document.getElementById('map-container');
  // 清除旧地标（保留SVG背景）
  mapContainer.querySelectorAll('.map-landmark').forEach(el => el.remove());

  // 渲染地标
  LANDMARKS.forEach(lm => {
    const types = ['physical', 'visual', 'hearing'];
    const allCompleted = types.every(t => {
      const eventNum = EVENT_MAP[lm.id][t];
      return completed.includes(`${t}-${eventNum}`);
    });
    const someCompleted = types.some(t => {
      const eventNum = EVENT_MAP[lm.id][t];
      return completed.includes(`${t}-${eventNum}`);
    });

    const dot = document.createElement('div');
    dot.className = 'map-landmark';
    dot.style.left = lm.x + '%';
    dot.style.top = lm.y + '%';
    dot.title = lm.name;
    dot.innerHTML = `
      <div class="landmark-dot ${allCompleted ? 'completed' : (someCompleted ? '' : 'pulse')}">
        ${allCompleted ? '✓' : lm.icon}
      </div>
      <div class="landmark-label">${lm.name}</div>
    `;
    dot.onclick = () => openLandmarkModal(lm);
    mapContainer.appendChild(dot);
  });

  // 检查是否所有事件完成
  if (allDone) {
    setTimeout(() => showEnding(), 600);
  }
}

// ============ 打开地标选择 Modal ============
function openLandmarkModal(landmark) {
  currentLandmarkId = landmark.id;
  const user = getCurrentUser();
  const completed = user.completedEvents || [];
  const types = [
    { key: 'physical', name: '肢体障碍', icon: '🦽', iconImg: '肢体障碍.png', color: '#7CB89E', desc: '以轮椅使用者的视角体验世界' },
    { key: 'visual', name: '视力障碍', icon: '👨\u200d🦯', iconImg: '视障.png', color: '#5B8C9E', desc: '以低视力者的视角感受世界' },
    { key: 'hearing', name: '听力障碍', icon: '🦻', iconImg: '听障.png', color: '#9B8EBF', desc: '以听障者的视角聆听无声世界' }
  ];

  let html = `
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:32px;margin-bottom:4px;">${landmark.icon}</div>
      <div style="font-size:18px;font-weight:700;color:var(--warm-brown);">${landmark.name}</div>
      <div style="font-size:13px;color:var(--warm-brown-light);margin-top:2px;">选择体验视角</div>
    </div>
    <div class="landmark-type-list">
  `;

  types.forEach(t => {
    const eventNum = EVENT_MAP[landmark.id][t.key];
    const eventId = `${t.key}-${eventNum}`;
    const isCompleted = completed.includes(eventId);
    const data = GAME_DATA[t.key];
    const event = data.events[eventNum - 1];

    html += `
      <div class="landmark-type-item ${isCompleted ? 'completed' : ''}" onclick="${isCompleted ? '' : `selectLandmarkType('${t.key}')`}">
        <div class="type-icon-small" style="background:linear-gradient(135deg,${t.color}22,${t.color}11)">
          <img src="${t.iconImg}" alt="${t.name}" class="type-icon-img">
        </div>
        <div class="type-info">
          <div class="type-name">${t.name}</div>
          <div class="type-desc">${event.title}</div>
        </div>
        <div class="type-status ${isCompleted ? 'done' : 'todo'}">${isCompleted ? '✅ 已完成' : '🔍 探索'}</div>
      </div>
    `;
  });

  html += `
    </div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-text" onclick="closeLandmarkModal()">取消</button>
    </div>
  `;

  document.getElementById('landmark-modal-inner').innerHTML = html;
  document.getElementById('landmark-modal').classList.add('active');
}

function closeLandmarkModal() {
  document.getElementById('landmark-modal').classList.remove('active');
  currentLandmarkId = null;
}

function selectLandmarkType(type) {
  currentType = type;
  const eventNum = EVENT_MAP[currentLandmarkId][type];
  currentEventId = `${type}-${eventNum}`;
  closeLandmarkModal();
  openEventModal(type, eventNum);
}

// ============ 打开事件 Modal ============
function openEventModal(type, eventNum) {
  const data = GAME_DATA[type];
  const event = data.events[eventNum - 1];
  const isSemi = currentMode === 'semi';
  const charSVG = getStageCharArt(type, event.stageType);
  const sceneSVG = SCENE_ART[type][eventNum - 1];

  document.getElementById('modal-inner').innerHTML = `
    <div class="character-portrait">
      <div class="portrait-svg">${charSVG}</div>
      <div class="portrait-info">
        <div class="portrait-name">${isSemi ? '旁观者视角' : data.name} · ${event.stage}</div>
        <div class="portrait-desc">${event.title}</div>
      </div>
    </div>
    <div class="scene-illustration">${sceneSVG}</div>
    <div class="scene-header">
      <span class="scene-stage-tag ${event.stageType}">${event.stage}</span>
    </div>
    <div class="scene-text">${isSemi ? (event.sceneSemi || event.scene) : event.scene}</div>
    <div class="choices">
      <button class="choice-btn" onclick="makeModalChoice('A')">
        <span class="choice-letter">A</span>
        <span>${isSemi ? (event.optionASemi || event.optionA) : event.optionA}</span>
      </button>
      <button class="choice-btn" onclick="makeModalChoice('B')">
        <span class="choice-letter">B</span>
        <span>${isSemi ? (event.optionBSemi || event.optionB) : event.optionB}</span>
      </button>
    </div>
  `;
  document.getElementById('event-modal').classList.add('active');
}

function closeEventModal() {
  document.getElementById('event-modal').classList.remove('active');
  currentEventId = null;
  currentType = null;
}

// ============ Modal 内做出选择 ============
function makeModalChoice(choice) {
  const user = getCurrentUser();
  if (!user || !currentEventId) return;

  const type = currentType;
  const eventNum = parseInt(currentEventId.split('-')[1]);
  const event = GAME_DATA[type].events[eventNum - 1];

  const isCorrect = choice === 'A';
  lastChoiceCorrect = isCorrect;
  const points = isCorrect ? 10 : -5;

  // 更新用户数据
  user.empathyScore = (user.empathyScore || 0) + points;
  if (!user.completedEvents) user.completedEvents = [];
  if (!user.completedEvents.includes(currentEventId)) {
    user.completedEvents.push(currentEventId);
  }
  if (!user.correctCount) user.correctCount = 0;
  if (!user.wrongCount) user.wrongCount = 0;
  if (!user.renoCount) user.renoCount = 0;
  if (isCorrect) user.correctCount++; else user.wrongCount++;

  // 保存
  const users = loadUsers();
  const idx = users.findIndex(u => u.username === user.username);
  if (idx >= 0) users[idx] = user;
  saveUsers(users);

  const isSemi = currentMode === 'semi';
  const feedback = isCorrect
    ? (isSemi ? (event.feedbackASemi || event.feedbackA) : event.feedbackA)
    : (isSemi ? (event.feedbackBSemi || event.feedbackB) : event.feedbackB);

  // 在 Modal 内显示反馈
  document.getElementById('modal-inner').innerHTML = `
    <div class="feedback-icon ${isCorrect ? 'positive' : 'negative'}">
      ${isCorrect ? '💡' : '💭'}
    </div>
    <div class="feedback-title">${isCorrect ? '你做出了正确的选择' : '这是一个值得思考的选择'}</div>
    <div class="feedback-text">${feedback.emotion}</div>
    <div style="background:var(--warm-cream);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:16px;text-align:left;">
      <div style="font-size:13px;font-weight:700;color:var(--warm-brown);margin-bottom:6px;">📚 科普小知识</div>
      <div style="font-size:13px;color:var(--warm-brown-light);line-height:1.7;">${feedback.knowledge}</div>
    </div>
    <div class="score-change" style="color:${isCorrect ? 'var(--soft-green)' : 'var(--soft-red)'}">
      ${isCorrect ? '+' : ''}${points} 共情值
    </div>
    <div style="text-align:center;">
      <button class="btn btn-primary" id="modal-continue-btn" onclick="modalFeedbackContinue()">继续探索 →</button>
    </div>
  `;

  // 如果需要改造且选择了正确选项
  if (event.hasRenovation && isCorrect) {
    const scoreChange = document.querySelector('#modal-inner .score-change');
    scoreChange.insertAdjacentHTML('afterend', `
      <div style="text-align:center;margin-bottom:14px;padding:12px;background:rgba(102,187,106,0.08);border-radius:var(--radius-sm);">
        <div style="font-size:13px;font-weight:700;color:var(--soft-green);margin-bottom:4px;">🏗️ 城市改造机会</div>
        <div style="font-size:12px;color:var(--warm-brown-light);margin-bottom:8px;">${event.renovation.location}</div>
        <button class="btn btn-sm btn-primary" style="background:linear-gradient(135deg,var(--soft-green),#43A047);margin-right:6px;margin-bottom:4px;" onclick="doModalRenovation()">🔧 改造 (+15分)</button>
        <button class="btn btn-sm btn-text" onclick="skipModalRenovation()">跳过</button>
      </div>
    `);
  }
}

function modalFeedbackContinue() {
  closeEventModal();
  renderMap();
}

function doModalRenovation() {
  const user = getCurrentUser();
  user.empathyScore = (user.empathyScore || 0) + 15;
  if (!user.renoCount) user.renoCount = 0;
  user.renoCount++;
  const users = loadUsers();
  const idx = users.findIndex(u => u.username === user.username);
  if (idx >= 0) users[idx] = user;
  saveUsers(users);

  const renoArea = document.querySelector('#modal-inner div[style*="城市改造机会"]');
  if (renoArea) {
    renoArea.innerHTML = `
      <div style="font-size:24px;">🏗️</div>
      <div style="font-size:14px;font-weight:700;color:var(--soft-green);">改造成功！+15 共情值</div>
      <div style="font-size:12px;color:var(--warm-brown-light);margin-top:4px;">城市因为你变得更友好了</div>
    `;
  }
  showToast('🔧 改造成功！+15 共情值 🎉');
}

function skipModalRenovation() {
  const renoArea = document.querySelector('#modal-inner div[style*="城市改造机会"]');
  if (renoArea) renoArea.style.display = 'none';
  showToast('已跳过城市改造');
}

// ============ 结局 ============
function showEnding() {
  const user = getCurrentUser();
  const s = user.empathyScore || 0;
  let level = s >= 80 ? 'high' : (s >= 30 ? 'mid' : 'low');
  // 综合所有类型的结局文本（取第一个类型的结局作为展示，但文本是通用的）
  const ending = GAME_DATA.physical.endings[level];
  const card = document.getElementById('ending-card');
  const doneCount = user.completedEvents ? user.completedEvents.length : 0;

  const levelColor = level === 'high' ? 'var(--soft-green)' : (level === 'mid' ? 'var(--golden)' : 'var(--soft-red)');
  const levelBg = level === 'high' ? 'rgba(102,187,106,0.1)' : (level === 'mid' ? 'rgba(124,184,158,0.1)' : 'rgba(239,83,80,0.1)');

  card.innerHTML = `
    <div class="ending-hero">${ENDING_ART[level]}</div>
    <div class="ending-title">${ending.title}</div>
    <div class="ending-rank" style="display:inline-block;padding:6px 20px;border-radius:20px;background:${levelBg};color:${levelColor};font-weight:600;font-size:14px;">${ending.levelText}</div>
    <div class="ending-score-display" style="margin-top:16px;">
      <div class="score-num">${s}</div>
      <div class="score-label">共情值</div>
    </div>
    <div style="font-size:14px;color:var(--warm-brown);line-height:1.9;text-align:left;background:var(--warm-cream);border-radius:var(--radius-sm);padding:16px;margin-bottom:16px;white-space:pre-line;">${ending.text}</div>
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-val">${doneCount}</div><div class="stat-label">完成事件</div></div>
      <div class="stat-item"><div class="stat-val">${user.correctCount || 0}</div><div class="stat-label">正确选择</div></div>
      <div class="stat-item"><div class="stat-val">${user.renoCount || 0}</div><div class="stat-label">城市改造</div></div>
    </div>
  `;
  showScreen('screen-ending');
}

// ============ 按钮事件 ============
document.getElementById('btn-replay').onclick = function() {
  const user = getCurrentUser();
  if (!user) { showScreen('screen-auth'); return; }
  user.completedEvents = [];
  user.empathyScore = 0;
  user.correctCount = 0;
  user.wrongCount = 0;
  user.renoCount = 0;
  const users = loadUsers();
  const idx = users.findIndex(u => u.username === user.username);
  if (idx >= 0) users[idx] = user;
  saveUsers(users);
  closeEventModal();
  closeLandmarkModal();
  renderMap();
  showToast('🔄 重新开始探索！');
  showScreen('screen-map');
};

document.getElementById('btn-home').onclick = function() {
  closeEventModal();
  closeLandmarkModal();
  renderMap();
  showScreen('screen-map');
};

// ============ 初始化 ============
// 检查是否已有登录用户，自动进入地图
const autoUser = getCurrentUser();
if (autoUser) {
  if (autoUser.mode) currentMode = autoUser.mode;
  document.getElementById('mode-toggle-label').textContent = getModeLabel();
  enterMap();
} else {
  showScreen('screen-auth');
}

// Modal 点击遮罩关闭
document.getElementById('event-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEventModal();
});
document.getElementById('landmark-modal').addEventListener('click', function(e) {
  if (e.target === this) closeLandmarkModal();
});
</script>
